<!DOCTYPE html>
<html>
<head>
  <title>Kiosk — {{ device_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root{
      --bg:#0f172a;
      --panel:#111827;

      --ok:#22c55e;
      --fail:#ef4444;

      --text:#e5e7eb;
      --muted:#94a3b8;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      font-family: Inter, Arial, sans-serif;

      background:radial-gradient(circle at top,#1e293b,var(--bg));
      color:var(--text);
    }

    .kiosk-container{
      width:100%;
      max-width:900px;
      padding:40px;
      text-align:center;
    }

    .device-title{
      font-size:28px;
      font-weight:700;
      margin-bottom:30px;
      color:white;
    }

    .scan-input{
      width:100%;
      max-width:640px;

      font-size:26px;
      padding:18px 22px;

      border-radius:14px;
      border:none;

      outline:none;

      background:#1f2937;
      color:white;

      text-align:center;

      box-shadow:0 10px 30px rgba(0,0,0,.4);
    }

    .scan-input::placeholder{
      color:var(--muted);
    }

    .status{
      margin-top:50px;

      min-height:90px;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:54px;
      font-weight:800;

      letter-spacing:1px;

      transition:all .2s ease;
    }

    .ok{
      color:var(--ok);
    }

    .fail{
      color:var(--fail);
    }

    .reason{
      margin-top:12px;
      font-size:20px;
      color:var(--muted);
      font-weight:500;
    }

    .footer{
      position:fixed;
      bottom:16px;
      font-size:13px;
      color:var(--muted);
    }

    @media(max-width:768px){

      .device-title{
        font-size:22px;
      }

      .scan-input{
        font-size:22px;
        padding:16px;
      }

      .status{
        font-size:40px;
      }

    }
  </style>
</head>

<body>

<div class="kiosk-container">

  <div class="device-title">
    {{ device_name }}
  </div>

  <input
    id="qrInput"
    class="scan-input"
    type="text"
    placeholder="Scan QR..."
    autofocus
  />

  <div id="status" class="status"></div>
  <div id="reason" class="reason"></div>

</div>

<div class="footer">
  GymOS Access Terminal
</div>

<script>

const input = document.getElementById("qrInput");
const statusBox = document.getElementById("status");
const reasonBox = document.getElementById("reason");

async function validateToken(token){

  const response = await fetch(
    "/api/access/gyms/{{ gym_id }}/devices/{{ device_id }}/kiosk/validate/",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "X-CSRFToken":"{{ csrf_token }}"
      },
      body:JSON.stringify({token})
    }
  );

  const data = await response.json();

  if(data.allow){

    statusBox.className="status ok";
    statusBox.innerText="ACCESS GRANTED";
    reasonBox.innerText="";

  }else{

    statusBox.className="status fail";
    statusBox.innerText="ACCESS DENIED";
    reasonBox.innerText=data.reason || "";

  }

  setTimeout(()=>{
    statusBox.innerText="";
    reasonBox.innerText="";
  },2000);

}

input.addEventListener("keydown", async (e)=>{

  if(e.key !== "Enter") return;

  const token = input.value.trim();

  input.value="";

  if(!token) return;

  validateToken(token);

});

</script>

</body>
</html>
