<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GymOS Offline</title>
  <style>
    :root {
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --primary:#4f46e5;
      --shadow:0 18px 50px rgba(17,24,39,.10);
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
      font-family:Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(79,70,229,.08), transparent 30%),
        var(--bg);
      color:var(--text);
    }

    .card {
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,.92);
      border:1px solid rgba(255,255,255,.75);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:28px;
      text-align:center;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .logo {
      width:52px;
      height:52px;
      margin:0 auto 16px;
      border-radius:16px;
      background:linear-gradient(135deg, #4f46e5, #4338ca);
      box-shadow:0 14px 28px rgba(79,70,229,.22);
    }

    h1 {
      margin:0;
      font-size:22px;
      line-height:1.2;
    }

    p {
      margin:10px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .actions {
      margin-top:18px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn {
      min-height:42px;
      padding:10px 16px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      font-weight:700;
      cursor:pointer;
    }

    .btn.primary {
      background:var(--primary);
      color:#fff;
      border-color:transparent;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"></div>
    <h1>You’re offline</h1>
    <p>GymOS can’t reach the internet right now. Check your connection and try again.</p>

    <div class="actions">
      <button class="btn primary" onclick="location.reload()">Try again</button>
      <button class="btn" onclick="window.location.href='/accounts/login/'">Go to login</button>
    </div>
  </div>
</body>
</html>
